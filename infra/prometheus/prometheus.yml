global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:4000"]
    metrics_path: "/metrics"

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:4001"]
    metrics_path: "/metrics"

  - job_name: "ride-service"
    static_configs:
      - targets: ["ride-service:4002"]
    metrics_path: "/metrics"

  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:4004"]
    metrics_path: "/metrics"

