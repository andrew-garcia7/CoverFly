apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: coverfly
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: coverfly/api-gateway:latest
          ports: [{ containerPort: 4000 }]
          env:
            - { name: PORT, value: "4000" }
            - { name: CORS_ORIGIN, value: "http://localhost,http://localhost:5173" }
            - { name: AUTH_SERVICE_URL, value: "http://auth-service:4001" }
            - { name: USER_SERVICE_URL, value: "http://user-service:4002" }
            - { name: RIDE_SERVICE_URL, value: "http://ride-service:4002" }
            - { name: PAYMENT_SERVICE_URL, value: "http://payment-service:4004" }
            - { name: REALTIME_SERVICE_URL, value: "http://realtime-service:4010" }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: coverfly
spec:
  selector: { app: api-gateway }
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: coverfly
spec:
  replicas: 1
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      containers:
        - name: auth-service
          image: coverfly/auth-service:latest
          ports: [{ containerPort: 4001 }]
          env:
            - { name: PORT, value: "4001" }
            - { name: MONGODB_URI, value: "mongodb://mongo:27017/coverfly" }
            - { name: CORS_ORIGIN, value: "http://localhost,http://localhost:5173" }
            - { name: JWT_PRIVATE_KEY_PEM, value: "dev-private" }
            - { name: JWT_PUBLIC_KEY_PEM, value: "dev-private" }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: coverfly
spec:
  selector: { app: auth-service }
  ports:
    - port: 4001
      targetPort: 4001
---
