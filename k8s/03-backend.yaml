apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: coverfly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: coverfly/auth-service:demo
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "4001"
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: MONGODB_URI
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: CORS_ORIGIN
            - name: DEMO_MODE
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: DEMO_MODE
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: JWT_ISSUER
            - name: JWT_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: JWT_AUDIENCE
            - name: JWT_PRIVATE_KEY_PEM
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: JWT_PRIVATE_KEY_PEM
            - name: JWT_PUBLIC_KEY_PEM
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: JWT_PUBLIC_KEY_PEM
          ports:
            - containerPort: 4001
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4001
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: coverfly
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 4001
      targetPort: 4001

