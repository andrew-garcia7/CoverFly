apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: coverfly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: coverfly/payment-service:demo
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "4004"
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: MONGODB_URI
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: CORS_ORIGIN
            - name: PAYMENTS_PROVIDER
              value: "mock"
            - name: DEMO_MODE
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: DEMO_MODE
          ports:
            - containerPort: 4004
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4004
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4004
            initialDelaySeconds: 20
            periodSeconds: 10

