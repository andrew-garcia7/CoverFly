---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: coverfly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: coverfly/api-gateway:demo
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "4000"
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: coverfly-config
                  key: CORS_ORIGIN
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:4001"
            - name: RIDE_SERVICE_URL
              value: "http://ride-service:4002"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:4004"
          ports:
            - containerPort: 4000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: coverfly
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 30040

