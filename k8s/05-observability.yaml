apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: coverfly
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "api-gateway"
        static_configs:
          - targets: ["api-gateway:4000"]
        metrics_path: "/metrics"

      - job_name: "auth-service"
        static_configs:
          - targets: ["auth-service:4001"]
        metrics_path: "/metrics"

      - job_name: "ride-service"
        static_configs:
          - targets: ["ride-service:4002"]
        metrics_path: "/metrics"

      - job_name: "payment-service"
        static_configs:
          - targets: ["payment-service:4004"]
        metrics_path: "/metrics"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: coverfly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: cfg
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: cfg
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: coverfly
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30900

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: coverfly
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: "coverfly"
        orgId: 1
        folder: "CoverFly"
        type: file
        disableDeletion: true
        editable: true
        options:
          path: /var/lib/grafana/dashboards
  coverfly-overview.json: |
    {
      "uid": "coverfly-overview",
      "title": "CoverFly Overview",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP Request Duration (p95)",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 9 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, job) (rate(http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP Requests/sec",
          "gridPos": { "x": 0, "y": 9, "w": 24, "h": 9 },
          "targets": [
            {
              "expr": "sum by (job) (rate(http_request_duration_seconds_count[1m]))",
              "legendFormat": "{{job}}"
            }
          ]
        }
      ],
      "templating": { "list": [] },
      "annotations": { "list": [] }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: coverfly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: ds
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: dp
              mountPath: /etc/grafana/provisioning/dashboards/dashboard.yml
              subPath: dashboard.yml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards/coverfly-overview.json
              subPath: coverfly-overview.json
      volumes:
        - name: ds
          configMap:
            name: grafana-provisioning
            items:
              - key: datasource.yml
                path: datasource.yml
        - name: dp
          configMap:
            name: grafana-provisioning
            items:
              - key: dashboard.yml
                path: dashboard.yml
        - name: dashboards
          configMap:
            name: grafana-provisioning
            items:
              - key: coverfly-overview.json
                path: coverfly-overview.json

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: coverfly
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30030

