apiVersion: apps/v1
kind: Deployment
metadata:
  name: rider-web
  namespace: coverfly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rider-web
  template:
    metadata:
      labels:
        app: rider-web
    spec:
      containers:
        - name: rider-web
          image: coverfly/rider-web:demo
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: rider-web
  namespace: coverfly
spec:
  type: NodePort
  selector:
    app: rider-web
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30000

