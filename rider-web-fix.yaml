apiVersion: apps/v1
kind: Deployment
metadata:
  name: rider-web
  namespace: coverfly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rider-web
  template:
    metadata:
      labels:
        app: rider-web
    spec:
      containers:
      - name: rider-web
        image: coverfly-rider-web:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rider-web
  namespace: coverfly
spec:
  type: NodePort
  selector:
    app: rider-web
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30174