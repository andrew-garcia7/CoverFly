apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride-service
  namespace: coverfly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ride-service
  template:
    metadata:
      labels:
        app: ride-service
    spec:
      containers:
      - name: ride-service
        image: coverfly-ride-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4002
---
apiVersion: v1
kind: Service
metadata:
  name: ride-service
  namespace: coverfly
spec:
  selector:
    app: ride-service
  ports:
  - port: 4002
    targetPort: 4002

