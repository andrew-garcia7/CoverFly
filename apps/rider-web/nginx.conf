server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  include /etc/nginx/mime.types;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass http://api-gateway:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}