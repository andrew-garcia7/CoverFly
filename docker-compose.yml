services:
  mongo:
    image: mongo:8.2
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"quit(db.adminCommand('ping').ok ? 0 : 1)\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  auth-service:
    image: coverfly/auth-service:demo
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 4001
      MONGODB_URI: mongodb://mongo:27017/coverfly
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
      DEMO_MODE: "true"
      JWT_ISSUER: coverfly
      JWT_AUDIENCE: coverfly-web
      JWT_PRIVATE_KEY_PEM: dev-private
      JWT_PUBLIC_KEY_PEM: dev-private
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4001/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  ride-service:
    image: coverfly/ride-service:demo
    build:
      context: .
      dockerfile: services/ride-service/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 4002
      MONGODB_URI: mongodb://mongo:27017/coverfly
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
    ports:
      - "4002:4002"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4002/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  payment-service:
    image: coverfly/payment-service:demo
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 4004
      MONGODB_URI: mongodb://mongo:27017/coverfly
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
      PAYMENTS_PROVIDER: mock
      DEMO_MODE: "true"
    ports:
      - "4004:4004"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4004/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  api-gateway:
    image: coverfly/api-gateway:demo
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      ride-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    environment:
      AUTH_SERVICE_URL: http://auth-service:4001
      RIDE_SERVICE_URL: http://ride-service:4002
      PAYMENT_SERVICE_URL: http://payment-service:4004
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  rider-web:
    image: coverfly/rider-web:demo
    build:
      context: .
      dockerfile: apps/rider-web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "3000:80"

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      api-gateway:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      ride-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3003:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  mongo_data:
  prometheus_data:
  grafana_data: